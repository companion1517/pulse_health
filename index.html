<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0b0d10" media="(prefers-color-scheme: dark)"/>
<meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)"/>
<title>Pulse Health</title>

<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="app.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="app-body">
<div id="root"></div>

<script type="text/babel" src="components/Icon.jsx"></script>
<script type="text/babel" src="components/DB.jsx"></script>
<script type="text/babel" src="components/Store.jsx"></script>
<script type="text/babel" src="components/DataStore.jsx"></script>
<script type="text/babel" src="components/UI.jsx"></script>
<script type="text/babel" src="components/WeightModule.jsx"></script>
<script type="text/babel" src="components/FastModule.jsx"></script>
<script type="text/babel" src="components/HRModule.jsx"></script>
<script type="text/babel" src="components/HRCamera.jsx"></script>
<script type="text/babel" src="components/WorkoutModule.jsx"></script>
<script type="text/babel" src="components/ExtraScreens.jsx"></script>
<script type="text/babel" src="components/Home.jsx"></script>
<script type="text/babel" src="components/AppShell.jsx"></script>

<script type="text/babel">
function Root() {
  const { store, setStore, reload, actions } = useDataStore();

  React.useEffect(() => {
    const theme = store?.profile?.theme || 'dark';
    const root = document.documentElement;
    const apply = () => {
      let resolved = theme;
      if (theme === 'system') {
        resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      root.setAttribute('data-theme', resolved);
    };
    apply();
    if (theme === 'system') {
      const mq = window.matchMedia('(prefers-color-scheme: light)');
      mq.addEventListener('change', apply);
      return () => mq.removeEventListener('change', apply);
    }
  }, [store?.profile?.theme]);

  if (!store) return <SplashScreen/>;
  return <AppShell store={store} setStore={setStore} reload={reload} actions={actions}/>;
}

function SplashScreen() {
  return (
    <div style={{
      position: 'fixed', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'var(--bg-0)', color: 'var(--fg-2)',
      fontFamily: 'var(--font-mono)', fontSize: 12, letterSpacing: '0.1em',
      textTransform: 'uppercase',
    }}>Pulse Health</div>
  );
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed', err));
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
