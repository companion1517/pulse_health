name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare web bundle
        run: |
          mkdir -p _site
          # Copy only the files needed at runtime
          rsync -av \
            --exclude='android/' \
            --exclude='.github/' \
            --exclude='fastlane/' \
            --exclude='*.md' \
            --exclude='LICENSE' \
            --exclude='.gitignore' \
            --exclude='_site/' \
            ./ _site/
          # Keep README/PRIVACY accessible from the deployed site
          cp README.md PRIVACY.md _site/ 2>/dev/null || true

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
